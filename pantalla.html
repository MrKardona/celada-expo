<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pantalla | Cómo importar celulares para dummies</title>
<style>
:root{--bg:#0c0c0e;--card:#17171c;--txt:#f6f6f8;--txt2:#a8a8b3;--line:#2a2a32;--acc:#ffb300;--gold:#ffc53d;--grad:linear-gradient(135deg,#ffd66b,#ffb300 45%,#ff8a00)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(255,164,0,.12),transparent),var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
.top{display:flex;justify-content:space-between;align-items:center;padding:22px 40px;border-bottom:1px solid var(--line)}
.marca{font-weight:900;font-size:1.3rem;letter-spacing:.04em}
.marca b{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.vivo{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:10px 20px;font-weight:800;font-size:1.05rem}
.vivo .dot{width:10px;height:10px;border-radius:50%;background:#22c55e;animation:lat 1.5s infinite}
@keyframes lat{0%,100%{opacity:1}50%{opacity:.3}}
main{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;text-align:center}
h1{font-size:clamp(2.2rem,5vw,4rem);letter-spacing:-.02em;line-height:1.1;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:14px}
.titulazo{font-size:clamp(2.6rem,6.5vw,5.2rem);font-weight:900;line-height:1.06;background:linear-gradient(90deg,#f6f6f8 30%,#c9c9d4 50%,#f6f6f8 70%);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:brillo 3.5s linear infinite}
.titulazo .dum{background:linear-gradient(90deg,#ffd66b,#ff8a00,#ffd66b);background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:brillo 3.5s linear infinite}
@keyframes brillo{to{background-position:200% center}}
.sub{color:var(--txt2);font-size:1.3rem;margin-bottom:26px}
.qr{background:#fff;padding:18px;border-radius:24px;box-shadow:0 0 60px rgba(255,164,0,.25)}
.qr img{display:block;width:min(38vh,340px);height:min(38vh,340px)}
.preg{font-size:clamp(1.8rem,4vw,3.2rem);max-width:900px;color:var(--txt);letter-spacing:-.02em;line-height:1.15;margin-bottom:36px}
.barras{width:min(760px,90vw);display:flex;flex-direction:column;gap:16px}
.fila{text-align:left}
.fila .lab{display:flex;justify-content:space-between;font-weight:800;font-size:1.25rem;margin-bottom:7px}
.fila .lab .n{color:var(--gold)}
.track{background:var(--card);border:1px solid var(--line);border-radius:12px;height:34px;overflow:hidden}
.fill{height:100%;width:0;background:var(--grad);border-radius:12px;transition:width .6s cubic-bezier(.4,0,.2,1);min-width:0}
.fila.ok .fill{background:linear-gradient(90deg,#34d399,#22c55e)}
.fila.ok .lab{color:#22c55e}
.rk{width:min(640px,90vw)}
.rk .item{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 22px;margin-bottom:9px;font-weight:800;font-size:1.3rem;opacity:0;transform:translateY(16px);animation:sube .5s forwards}
.rk .item:nth-child(1){border-color:var(--gold);background:rgba(255,179,0,.1);font-size:1.5rem}
@keyframes sube{to{opacity:1;transform:none}}
.premio{margin-top:18px;font-size:1.35rem;color:var(--gold);font-weight:800}
.pop{position:fixed;left:0;top:0;z-index:99;pointer-events:none}
/* ── Galería de HISTORIA: texto fijo izquierda + fotos pasando derecha ── */
.hist{display:flex;align-items:stretch;gap:clamp(28px,4vw,64px);width:min(1500px,94vw);height:min(74vh,720px)}
.hist-txt{flex:0 0 40%;display:flex;flex-direction:column;justify-content:center;text-align:left}
.hist-txt .kick{letter-spacing:.2em;font-weight:800;font-size:1rem;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.hist-txt .emo{font-size:3.4rem;margin-bottom:12px}
.hist-txt h1{font-size:clamp(1.9rem,3.2vw,3rem);line-height:1.12;margin-bottom:16px;text-align:left}
.hist-txt p{color:var(--txt);font-size:clamp(1.1rem,1.5vw,1.5rem);line-height:1.4}
.hist-gal{flex:1;position:relative;border-radius:24px;overflow:hidden;background:var(--card);border:1px solid var(--line);box-shadow:0 0 70px rgba(255,164,0,.18)}
.hist-gal img,.hist-gal video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease}
.hist-gal img.on,.hist-gal video.on{opacity:1}
.hist-gal .cont{position:absolute;bottom:14px;right:16px;z-index:2;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);color:#fff;font-weight:700;font-size:.95rem;padding:5px 13px;border-radius:100px}
/* ── Gancho: texto fijo arriba + imágenes pasando abajo (sin taparse) ── */
.gancho-wrap{width:min(1320px,94vw);height:86vh;display:flex;flex-direction:column;align-items:center}
.gancho-frases{text-align:center;flex:0 0 auto}
.gancho-frases .gf{font-size:clamp(1.5rem,3vw,2.7rem);font-weight:900;letter-spacing:-.02em;line-height:1.24;margin-bottom:6px}
.gancho-gal{position:relative;flex:1 1 auto;width:100%;margin-top:22px}
.gancho-gal .gimg{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .8s ease;filter:drop-shadow(0 18px 50px rgba(0,0,0,.5))}
.gancho-gal .gimg.on{opacity:1}
</style>
</head>
<body>
<div class="top">
  <span class="marca" style="display:flex;align-items:center;gap:16px">
    <img src="logo.png" alt="Celada Shopper" style="height:44px;width:auto">
    <span>IMPORTANDO CELULARES <b>PARA DUMMIES</b></span>
  </span>
  <span class="vivo"><span class="dot"></span><span id="nJug">0</span> jugando</span>
</div>
<main id="app"></main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="show-config.js"></script>
<script>
const sb = supabase.createClient(SB_URL, SB_KEY);
const app = document.getElementById('app');
let estado='espera', conteos={}, actual='', galeriaTimer=null, ganchoTimers=[];

function burst(n,emo){for(let i=0;i<n;i++){const p=document.createElement('span');p.className='pop';p.textContent=emo;p.style.fontSize=(22+Math.random()*22)+'px';document.body.appendChild(p);const x=innerWidth/2,y=innerHeight/2,a=Math.PI*2*i/n,v=250+Math.random()*350;p.animate([{transform:`translate(${x}px,${y}px) scale(.5)`,opacity:1},{transform:`translate(${x+Math.cos(a)*v}px,${y+Math.sin(a)*v}px) rotate(${(Math.random()-.5)*540}deg)`,opacity:0}],{duration:1100,easing:'ease-out'}).onfinish=()=>p.remove();}}

async function nJugadores(){
  const { count } = await sb.from('ic_participantes').select('*',{count:'exact',head:true});
  document.getElementById('nJug').textContent = count||0;
}
function vEspera(){
  app.innerHTML = `<h1 class="titulazo">Cómo importar celulares<br>para <span class="dum">DUMMIES</span></h1>
  <p class="sub">¿Serás capaz de convertirte en importador en 30 minutos?<br><b style="color:var(--txt)">Escanea y entra al reto</b> 👇</p>
  <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?size=600x600&data=${encodeURIComponent(URL_JUGAR)}" alt="QR"></div>`;
  const t = document.querySelector('.titulazo');
  if(t && t.animate){
    [['.titulazo',0],['.sub',200],['.qr',400]].forEach(function(par){
      const el = document.querySelector(par[0]);
      if(el) el.animate([{opacity:0,transform:'translateY(30px) scale(.96)'},{opacity:1,transform:'none'}],{duration:700,delay:par[1],easing:'cubic-bezier(.22,1.3,.36,1)',fill:'backwards'});
    });
  }
}
async function vPregunta(id, revelar){
  const q = IX[id];
  if(actual!==id){ conteos = {}; q.opciones.forEach((_,i)=>conteos[i]=0);
    const { data } = await sb.from('ic_respuestas').select('respuesta').eq('interaccion',id);
    (data||[]).forEach(r=>{ conteos[+r.respuesta]=(conteos[+r.respuesta]||0)+1; });
    actual = id;
  }
  const total = Object.values(conteos).reduce((a,b)=>a+b,0)||1;
  app.innerHTML = `<div class="preg">${q.pregunta}</div>
  <div class="barras">${q.opciones.map((o,i)=>`
    <div class="fila ${revelar && q.correcta===i ? 'ok':''}">
      <div class="lab"><span>${o}</span><span class="n" id="n${i}">${conteos[i]||0}</span></div>
      <div class="track"><div class="fill" id="f${i}" style="width:${Math.round((conteos[i]||0)/total*100)}%"></div></div>
    </div>`).join('')}</div>`;
  if(revelar) burst(16,'✅');
}
async function vFinal(){
  const { data } = await sb.from('ic_participantes').select('nombre,puntos').order('puntos',{ascending:false}).limit(10);
  app.innerHTML = `<h1>🏆 RANKING FINAL</h1><div class="rk">${(data||[]).map((p,i)=>`
    <div class="item" style="animation-delay:${i*.15}s"><span>${i===0?'👑':(i+1)+'.'} ${p.nombre}</span><span style="color:var(--gold)">${p.puntos} pts</span></div>`).join('')}</div>
  <div class="premio">${PREMIOS.top1}</div>
  <p class="sub" style="margin-top:10px">${PREMIOS.todos}</p>`;
  burst(30,'🏆');
}
function vSlide(id){
  /* soporta pasos: 'manos.2' = slide "manos", frase 2 */
  let paso = 0;
  if(id.includes('.')){ const par = id.split('.'); id = par[0]; paso = +par[1]; }
  const s = SLIDES[id]; if(!s) return vEspera();
  if(s.tipo === 'revelado'){
    const visibles = s.frases.slice(0, paso || 1);
    app.innerHTML = `<div class="sub" style="letter-spacing:.2em;font-weight:800;font-size:1.1rem;text-transform:uppercase;color:var(--gold);margin-bottom:26px">${s.kicker}</div>
      <div>${visibles.map(function(f,i){
        const ultima = i === visibles.length-1;
        return '<div class="frase'+(ultima?' nueva':'')+'" style="font-size:clamp(2rem,4.6vw,3.8rem);font-weight:900;letter-spacing:-.02em;line-height:1.2;margin-bottom:18px;'+(ultima?'color:var(--txt)':'color:#6a6a75')+'">'+f+'</div>';
      }).join('')}</div>`;
    const n = document.querySelector('.frase.nueva');
    if(n && n.animate) n.animate([{opacity:0,transform:'translateY(34px) scale(.94)'},{opacity:1,transform:'none'}],{duration:650,easing:'cubic-bezier(.22,1.3,.36,1)'});
    return;
  }
  if(s.tipo === 'gancho'){
    app.innerHTML = `<div class="gancho-wrap">
      <div class="sub" style="letter-spacing:.2em;font-weight:800;font-size:clamp(.9rem,1.4vw,1.15rem);text-transform:uppercase;color:var(--gold);margin-bottom:14px">${s.kicker||''}</div>
      <div id="frasesBox" class="gancho-frases"></div>
      <div id="ganchoGal" class="gancho-gal"></div>
    </div>`;
    const box = document.getElementById('frasesBox');
    const frases = s.frases || [];
    frases.forEach(function(f,i){
      const t = setTimeout(function(){
        const d = document.createElement('div');
        d.className = 'gf';
        d.style.color = (i===frases.length-1 ? 'var(--txt)' : '#7a7a85');
        d.innerHTML = f;
        box.appendChild(d);
        if(d.animate) d.animate([{opacity:0,transform:'translateY(24px)'},{opacity:1,transform:'none'}],{duration:600,easing:'cubic-bezier(.22,1.3,.36,1)'});
      }, i*FRASE_MS);
      ganchoTimers.push(t);
    });
    if(s.fotos && s.fotos.length){
      const gal = document.getElementById('ganchoGal');
      const imgs = s.fotos.map(function(f){ const im=document.createElement('img'); im.src=f; im.className='gimg'; gal.appendChild(im); return im; });
      const t2 = setTimeout(function(){
        imgs[0].classList.add('on');
        if(imgs.length > 1){
          let pi = 0;
          (function nx(){ galeriaTimer = setTimeout(function(){
            imgs[pi].classList.remove('on'); pi=(pi+1)%imgs.length; imgs[pi].classList.add('on'); nx();
          }, GAL_MS); })();
        }
      }, frases.length*FRASE_MS + 1000);
      ganchoTimers.push(t2);
    }
    return;
  }
  if(s.tipo === 'galeria' && s.fotos && s.fotos.length){
    const media = s.fotos.map(function(f,i){
      const on = i===0?'on':'';
      if(/\.(mp4|webm|mov)$/i.test(f))
        return '<video src="'+f+'" class="'+on+'" muted playsinline preload="auto"></video>';
      return '<img src="'+f+'" alt="" class="'+on+'">';
    }).join('');
    app.innerHTML = `<div class="hist">
      <div class="hist-txt">
        <div class="emo">${s.emoji||''}</div>
        <div class="kick">${s.kicker}</div>
        <h1>${s.titulo}</h1>
        <p>${s.texto}</p>
      </div>
      <div class="hist-gal" id="gal">
        ${media}
        <div class="cont" id="galCont">1 / ${s.fotos.length}</div>
      </div>
    </div>`;
    [['.hist-txt',0],['.hist-gal',150]].forEach(function(par){
      const el=document.querySelector(par[0]);
      if(el&&el.animate) el.animate([{opacity:0,transform:'translateY(24px)'},{opacity:1,transform:'none'}],{duration:650,delay:par[1],easing:'cubic-bezier(.22,1,.36,1)',fill:'backwards'});
    });
    const items = document.querySelectorAll('#gal img, #gal video'), cont = document.getElementById('galCont');
    if(items.length<=1){
      if(cont) cont.style.display='none';
      const u=items[0]; if(u && u.tagName==='VIDEO'){ u.loop=true; u.play().catch(function(){}); }
      return;
    }
    let gi=0;
    function mostrar(i){
      items.forEach(function(el){ el.classList.remove('on'); if(el.tagName==='VIDEO') el.pause(); });
      const el=items[i]; el.classList.add('on');
      if(cont) cont.textContent=(i+1)+' / '+items.length;
      if(el.tagName==='VIDEO'){
        el.currentTime=0; el.onended=avanzar;
        el.play().catch(function(){ galeriaTimer=setTimeout(avanzar, GAL_MS); });
      } else {
        galeriaTimer=setTimeout(avanzar, GAL_MS);
      }
    }
    function avanzar(){ gi=(gi+1)%items.length; mostrar(gi); }
    mostrar(0);
    return;
  }
  if(s.img){
    app.innerHTML = `<img src="${s.img}" alt="" style="max-width:96%;max-height:86vh;border-radius:22px;box-shadow:0 0 80px rgba(255,164,0,.25)" class="sl-img">`;
    const el=document.querySelector('.sl-img');
    if(el&&el.animate) el.animate([{opacity:0,transform:'scale(1.06)'},{opacity:1,transform:'scale(1)'}],{duration:900,easing:'cubic-bezier(.22,1,.36,1)'});
    return;
  }
  app.innerHTML = `<div class="slide">
    <div style="font-size:5rem;margin-bottom:14px" class="sl-a">${s.emoji}</div>
    <div class="sub sl-b" style="letter-spacing:.2em;font-weight:800;font-size:1rem;text-transform:uppercase;color:var(--gold)">${s.kicker}</div>
    <h1 class="sl-c" style="margin:6px 0 14px">${s.titulo}</h1>
    <p class="sub sl-d" style="max-width:820px;font-size:1.5rem;color:var(--txt)">${s.texto}</p>
  </div>`;
  ['sl-a','sl-b','sl-c','sl-d'].forEach(function(c,i){
    const el=document.querySelector('.'+c);
    if(el&&el.animate) el.animate([{opacity:0,transform:'translateY(26px)'},{opacity:1,transform:'none'}],{duration:600,delay:i*180,easing:'cubic-bezier(.22,1,.36,1)',fill:'backwards'});
  });
}
function carruselProductos(fotos){
  app.innerHTML = '<div style="position:relative;width:min(1200px,94vw);height:min(82vh,800px)" id="prodCar"></div>';
  const wrap = document.getElementById('prodCar');
  const imgs = fotos.map(function(f){
    const im = document.createElement('img');
    im.src = f;
    im.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0;transition:opacity .8s ease;filter:drop-shadow(0 24px 70px rgba(0,0,0,.55))';
    wrap.appendChild(im); return im;
  });
  if(!imgs.length) return;
  imgs[0].style.opacity = '1';
  if(imgs[0].animate) imgs[0].animate([{opacity:0,transform:'scale(1.05)'},{opacity:1,transform:'scale(1)'}],{duration:800,easing:'cubic-bezier(.22,1,.36,1)'});
  if(imgs.length <= 1) return;
  let pi = 0;
  function next(){
    imgs[pi].style.opacity = '0';
    pi = (pi+1) % imgs.length;
    imgs[pi].style.opacity = '1';
    galeriaTimer = setTimeout(next, GAL_MS);
  }
  galeriaTimer = setTimeout(next, GAL_MS);
}
function render(){
  if(galeriaTimer){ clearTimeout(galeriaTimer); galeriaTimer=null; }
  if(ganchoTimers.length){ ganchoTimers.forEach(clearTimeout); ganchoTimers=[]; }
  const rev = estado.startsWith('rev:');
  const e = estado.replace(/^rev:/,'');
  if(e==='espera'){ actual=''; vEspera(); }
  else if(e==='final'){ actual=''; vFinal(); }
  else if(e.startsWith('slide:')){ actual=''; vSlide(e.slice(6)); }
  else if(IX[e]){ vPregunta(e, rev); }
}
function pintaConteo(){
  const total = Object.values(conteos).reduce((a,b)=>a+b,0)||1;
  Object.keys(conteos).forEach(function(i){
    const n=document.getElementById('n'+i), f=document.getElementById('f'+i);
    if(n){ n.textContent=conteos[i]; f.style.width=Math.round(conteos[i]/total*100)+'%'; }
  });
}
async function init(){
  nJugadores();
  const { data } = await sb.from('ic_estado').select('interaccion').eq('id',1).single();
  if(data) estado = data.interaccion;
  render();
  sb.channel('e').on('postgres_changes',{event:'UPDATE',schema:'public',table:'ic_estado'},function(p){ estado=p.new.interaccion; render(); }).subscribe();
  sb.channel('r').on('postgres_changes',{event:'INSERT',schema:'public',table:'ic_respuestas'},function(p){
    if(p.new.interaccion===actual){ conteos[+p.new.respuesta]=(conteos[+p.new.respuesta]||0)+1; pintaConteo(); }
  }).subscribe();
  sb.channel('p').on('postgres_changes',{event:'INSERT',schema:'public',table:'ic_participantes'},function(){ nJugadores(); }).subscribe();
  /* efectos lanzados desde el panel (no cambian la diapositiva actual) */
  sb.channel('fx').on('broadcast',{event:'fx'},function(m){ lluvia(m.payload && m.payload.emo || '🙋', 44); }).subscribe();
}
function lluvia(emo, n){
  for(let i=0;i<n;i++){
    const p=document.createElement('span'); p.className='pop'; p.textContent=emo;
    p.style.fontSize=(26+Math.random()*30)+'px'; document.body.appendChild(p);
    const x=Math.random()*innerWidth, d=2200+Math.random()*1800, giro=(Math.random()-.5)*260;
    p.animate([
      {transform:`translate(${x}px,-60px) rotate(0deg)`,opacity:1},
      {transform:`translate(${x+(Math.random()-.5)*160}px,${innerHeight+80}px) rotate(${giro}deg)`,opacity:.9}
    ],{duration:d,delay:Math.random()*900,easing:'cubic-bezier(.3,.1,.6,1)',fill:'backwards'}).onfinish=()=>p.remove();
  }
}
init();
</script>
</body>
</html>
