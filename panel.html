<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panel | Cómo importar celulares para dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c0e;--card:#17171c;--txt:#f6f6f8;--txt2:#a8a8b3;--line:#2a2a32;--acc:#ffb300;--gold:#ffc53d;--grad:linear-gradient(135deg,#ffd66b,#ffb300 45%,#ff8a00)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Space Grotesk',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-variant-numeric:tabular-nums;padding:18px;max-width:480px;margin:0 auto}
h1{font-size:1.2rem;margin-bottom:4px}
.sub{color:var(--txt2);font-size:.85rem;margin-bottom:16px}
.stats{display:flex;gap:10px;margin-bottom:18px}
.st{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;text-align:center}
.st b{display:block;font-size:1.4rem;color:var(--gold)}
.st small{color:var(--txt2);font-size:.7rem}
.paso{display:flex;align-items:center;gap:10px;width:100%;padding:15px 14px;margin-bottom:9px;border:1.5px solid var(--line);border-radius:13px;background:var(--card);color:var(--txt);font-size:.95rem;font-weight:700;cursor:pointer;text-align:left}
.paso:active{transform:scale(.98)}
.paso.activo{border-color:var(--acc);background:rgba(255,179,0,.1)}
.paso .num{width:28px;height:28px;border-radius:50%;background:var(--grad);color:#1d1300;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0}
.paso .ptxt{display:flex;flex-direction:column;gap:3px;text-align:left}
.ok-hint{color:#22c55e;font-weight:700;font-size:.72rem}
.fila2{display:flex;gap:9px}
.fila2 .paso{flex:1}
.rev{background:rgba(34,197,94,.12);border-color:#22c55e}
.peligro{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.4);color:#ef4444;margin-top:16px}
.aviso{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--grad);color:#1d1300;font-weight:800;padding:10px 22px;border-radius:100px;opacity:0;transition:opacity .3s;pointer-events:none}
.aviso.ver{opacity:1}
</style>
</head>
<body>
<h1>🎛️ Panel del presentador</h1>
<p class="sub">Toca una interacción para lanzarla a todas las pantallas.</p>
<div class="stats">
  <div class="st"><b id="nJ">0</b><small>jugadores</small></div>
  <div class="st"><b id="nR">0</b><small>respuestas (actual)</small></div>
  <div class="st"><b id="act" style="font-size:.85rem;line-height:2">espera</b><small>en pantalla</small></div>
</div>
<div class="fila2" style="margin-bottom:12px">
  <button class="paso" id="btnAntes" style="flex:0 0 30%">⬅ Antes</button>
  <button class="paso" id="btnSig" style="background:var(--grad);color:#1d1300;border-color:transparent;font-weight:800;justify-content:center">SIGUIENTE ▶</button>
</div>
<div id="escaleta"></div>
<div class="fila2">
  <button class="paso rev" id="btnRev">✅ Revelar respuesta</button>
  <button class="paso" id="btnLluvia" style="border-color:rgba(255,179,0,.5)">🙋 Lluvia de manos</button>
</div>
<button class="paso" id="btnLibras" style="background:var(--grad);color:#1d1300;border-color:transparent;font-weight:800;justify-content:center;margin-top:16px">🎁 ACTIVAR LIBRAS (escanear QR)</button>
<button class="paso peligro" id="btnReset">🗑️ Reiniciar TODO (borra jugadores y puntos)</button>
<div id="scanLibras" style="position:fixed;inset:0;background:#000;z-index:99;display:none;flex-direction:column">
  <div style="padding:14px;text-align:center;background:#0c0c0e"><b style="color:var(--gold)">🎁 ACTIVAR LIBRAS</b> <span style="color:var(--txt2);font-size:.85rem">· apunta al QR del cliente</span></div>
  <div style="flex:1;position:relative;overflow:hidden">
    <video id="scanVideo" playsinline muted style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover"></video>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none"><div style="width:min(62vw,300px);aspect-ratio:1;border:3px solid rgba(255,179,0,.85);border-radius:22px;box-shadow:0 0 0 2000px rgba(0,0,0,.35)"></div></div>
  </div>
  <div id="scanStatus" style="padding:18px 14px;text-align:center;font-weight:800;font-size:1.15rem;background:#17171c;color:var(--txt2)">Buscando QR…</div>
  <button class="paso" id="scanCerrar" style="justify-content:center;border-radius:0;margin:0">Cerrar escáner</button>
</div>
<canvas id="scanCanvas" style="display:none"></canvas>
<div class="aviso" id="aviso">Enviado ✓</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<script src="show-config.js"></script>
<script>
const TOKEN='celada-show-2026';
const sb = supabase.createClient(SB_URL, SB_KEY);
let actual = 'espera';

function aviso(t){ const a=document.getElementById('aviso'); a.textContent=t; a.classList.add('ver'); setTimeout(()=>a.classList.remove('ver'),1400); }
async function enviar(interaccion){
  const r = await fetch(SB_URL+'/functions/v1/ic-control',{method:'POST',headers:{'Content-Type':'application/json','X-Panel-Token':TOKEN},body:JSON.stringify({interaccion})});
  if(r.ok){ aviso('Enviado ✓'); } else { aviso('Error ✗'); }
}
function marca(){
  document.querySelectorAll('.paso[data-i]').forEach(b=>b.classList.toggle('activo', b.dataset.i===actual.replace(/^rev:/,'')));
  document.getElementById('act').textContent = actual;
  refrescaR();
}
async function refrescaN(){
  const { count } = await sb.from('ic_participantes').select('*',{count:'exact',head:true});
  document.getElementById('nJ').textContent = count||0;
}
async function refrescaR(){
  const e = actual.replace(/^rev:/,'');
  if(e==='espera'||e==='final'){ document.getElementById('nR').textContent='—'; return; }
  const q = (typeof IX!=='undefined') ? IX[e] : null;
  let query = sb.from('ic_respuestas').select('*',{count:'exact',head:true});
  query = (q && q.tipo==='tienda') ? query.like('interaccion', e+':%') : query.eq('interaccion', e);
  const { count } = await query;
  document.getElementById('nR').textContent = count||0;
}
/* pinta la escaleta */
document.getElementById('escaleta').innerHTML = ESCALETA.map(function(p,i){
  const q = IX[p.id];
  const hint = (q && q.tipo==='quiz') ? '<small class="ok-hint">✓ Correcta: '+q.opciones[q.correcta]+'</small>' : '';
  return '<button class="paso" data-i="'+p.id+'"><span class="num">'+(i+1)+'</span><span class="ptxt">'+p.t+hint+'</span></button>';
}).join('');
document.querySelectorAll('.paso[data-i]').forEach(function(b){
  b.onclick = function(){ enviar(b.dataset.i); };
});
function idx(){ return ESCALETA.findIndex(function(p){ return p.id === actual.replace(/^rev:/,''); }); }
document.getElementById('btnSig').onclick = function(){
  const i = idx();
  if(i < ESCALETA.length - 1) enviar(ESCALETA[i+1].id);
  else aviso('Fin del show 🏆');
};
document.getElementById('btnAntes').onclick = function(){
  const i = idx();
  if(i > 0) enviar(ESCALETA[i-1].id);
};
document.getElementById('btnRev').onclick = function(){
  const e = actual.replace(/^rev:/,'');
  if(e==='espera'||e==='final'){ aviso('Lanza una pregunta primero'); return; }
  enviar('rev:'+e);
};
const fxCanal = sb.channel('fx');
fxCanal.subscribe();
document.getElementById('btnLluvia').onclick = function(){
  fxCanal.send({ type:'broadcast', event:'fx', payload:{ emo:'🙋' } });
  aviso('Lluvia enviada 🙋');
};
/* ── ESCÁNER de libras: la cámara del panel lee el QR personal del cliente
   (formato CELADALIBRAS|whatsapp|nombre), lo registra en libras_activadas
   y muestra ACTIVADO abajo. Escanea varios seguidos sin cerrar. ── */
let scanStream=null, scanRAF=null, scanUltimo='', scanUltimoT=0;
const scanStatus=document.getElementById('scanStatus');
function scanMsg(txt, color, bg){ scanStatus.textContent=txt; scanStatus.style.color=color; scanStatus.style.background=bg; }
function scanReset(){ scanMsg('Buscando QR…','#a8a8b3','#17171c'); }
async function scanProcesa(codigo){
  const ahora=Date.now();
  if(codigo===scanUltimo && ahora-scanUltimoT<4000) return; /* mismo QR aún en cámara */
  scanUltimo=codigo; scanUltimoT=ahora;
  if(codigo.indexOf('CELADALIBRAS|')!==0){ scanMsg('❌ Este QR no es de Celada','#fff','#7f1d1d'); setTimeout(scanReset,2200); return; }
  const partes=codigo.split('|');
  const whatsapp=(partes[1]||'').replace(/\D/g,''), nombre=partes.slice(2).join('|')||'Cliente';
  if(whatsapp.length<10){ scanMsg('❌ QR sin WhatsApp válido','#fff','#7f1d1d'); setTimeout(scanReset,2200); return; }
  scanMsg('Verificando…','#a8a8b3','#17171c');
  const { error } = await sb.from('libras_activadas').insert({nombre:nombre, whatsapp:whatsapp});
  if(!error){
    scanMsg('✅ ACTIVADO · '+nombre.split(' ')[0],'#062e12','#22c55e');
    if(navigator.vibrate) navigator.vibrate([40,40,120]);
  } else if(String(error.code)==='23505' || /duplicate|unique/i.test(error.message||'')){
    scanMsg('🟡 YA ESTABA ACTIVADO · '+nombre.split(' ')[0],'#1d1300','#ffc53d');
  } else {
    scanMsg('❌ Error, intenta de nuevo','#fff','#7f1d1d');
  }
  setTimeout(scanReset,2600);
}
function scanLoop(){
  const v=document.getElementById('scanVideo'), cv=document.getElementById('scanCanvas');
  if(v.readyState===v.HAVE_ENOUGH_DATA){
    cv.width=v.videoWidth; cv.height=v.videoHeight;
    const cx=cv.getContext('2d',{willReadFrequently:true});
    cx.drawImage(v,0,0,cv.width,cv.height);
    try{
      const img=cx.getImageData(0,0,cv.width,cv.height);
      const q=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(q && q.data) scanProcesa(q.data);
    }catch(e){}
  }
  scanRAF=requestAnimationFrame(scanLoop);
}
document.getElementById('btnLibras').onclick = async function(){
  document.getElementById('scanLibras').style.display='flex';
  scanReset();
  try{
    scanStream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}, audio:false});
    const v=document.getElementById('scanVideo');
    v.srcObject=scanStream; await v.play();
    scanLoop();
  }catch(e){
    scanMsg('❌ No hay acceso a la cámara. Revisa permisos.','#fff','#7f1d1d');
  }
};
document.getElementById('scanCerrar').onclick = function(){
  if(scanRAF){ cancelAnimationFrame(scanRAF); scanRAF=null; }
  if(scanStream){ scanStream.getTracks().forEach(function(t){ t.stop(); }); scanStream=null; }
  document.getElementById('scanLibras').style.display='none';
};
document.getElementById('btnReset').onclick = function(){
  if(confirm('¿Seguro? Se borran TODOS los jugadores, puntos y respuestas.')) enviar('__reset__');
};
async function init(){
  const { data } = await sb.from('ic_estado').select('interaccion').eq('id',1).single();
  if(data){ actual=data.interaccion; marca(); }
  refrescaN();
  sb.channel('e').on('postgres_changes',{event:'UPDATE',schema:'public',table:'ic_estado'},function(p){ actual=p.new.interaccion; marca(); }).subscribe();
  sb.channel('p').on('postgres_changes',{event:'INSERT',schema:'public',table:'ic_participantes'},refrescaN).subscribe();
  sb.channel('r').on('postgres_changes',{event:'INSERT',schema:'public',table:'ic_respuestas'},refrescaR).subscribe();
}
init();
</script>
</body>
</html>
